<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aurum CRM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/">
      <span class="brand-icon" style="font-size:1.2rem;">▲</span>
      <span>AURUM <span style="color:var(--text-dim);font-weight:400;letter-spacing:2px;font-size:.85rem;">CRM</span></span>
    </a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-3 gap-1">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}" href="/">
            <i class="bi bi-speedometer2"></i> Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'funil' %}active{% endif %}" href="/funil">
            <i class="bi bi-kanban"></i> Funil
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'clientes' %}active{% endif %}" href="/clientes">
            <i class="bi bi-people"></i> Clientes
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'todas_tarefas' %}active{% endif %}" href="/tarefas">
            <i class="bi bi-check2-square"></i> Tarefas
          </a>
        </li>
      </ul>
      <div class="ms-auto">
        <a href="/clientes/novo" class="btn-nav-new">
          <i class="bi bi-plus-lg"></i> Novo Cliente
        </a>
      </div>
    </div>
  </div>
</nav>

<div class="container-fluid px-4 py-4">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/main.js"></script>
</body>
</html>
