{% extends 'base.html' %}
{% block content %}

<div class="mb-4">
  <a href="/clientes" class="text-muted text-decoration-none" style="font-size:.85rem;">
    <i class="bi bi-arrow-left"></i> Clientes
  </a>
  <h1 class="page-title mt-2">{{ 'Editar Cliente' if cliente else 'Novo Cliente' }}</h1>
</div>

<div class="card" style="max-width:640px;">
  <div class="card-body">
    <form method="post">
      {% if next_url %}
      <input type="hidden" name="next" value="{{ next_url }}">
      {% endif %}
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Nome *</label>
          <input name="nome" class="form-control" required value="{{ cliente.nome if cliente else '' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">Empresa</label>
          <input name="empresa" class="form-control" value="{{ cliente.empresa if cliente else '' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">Telefone</label>
          <input name="telefone" class="form-control" value="{{ cliente.telefone if cliente else '' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">E-mail</label>
          <input name="email" type="email" class="form-control" value="{{ cliente.email if cliente else '' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">Serviço</label>
          <select name="servico" class="form-select">
            <option value="">Selecione...</option>
            {% for s in servicos %}
            <option value="{{ s }}" {{ 'selected' if cliente and cliente.servico == s }}>
              {{ servicos_display[s] }}
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Etapa</label>
          <select name="etapa" class="form-select">
            {% for e in etapas %}
            <option value="{{ e }}"
              {{ 'selected' if cliente and cliente.etapa == e else ('selected' if not cliente and e == 'Acesso') }}>
              {{ etapas_display[e] }}
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Valor cobrado (R$)</label>
          <input name="valor" type="number" step="0.01" min="0" class="form-control"
                 value="{{ cliente.valor if cliente and cliente.valor else '' }}">
        </div>
        <div class="col-md-4">
          <label class="form-label">Repasse Gerson (R$)</label>
          <input name="valor_socio" type="number" step="0.01" min="0" class="form-control"
                 value="{{ cliente.valor_socio if cliente and cliente.valor_socio else '' }}">
        </div>
        <div class="col-md-4">
          <label class="form-label">Dia de cobrança</label>
          <input name="dia_cobranca" type="number" min="1" max="31" class="form-control"
                 placeholder="Ex: 15"
                 value="{{ cliente.dia_cobranca if cliente and cliente.dia_cobranca else '' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">Responsável</label>
          <input name="responsavel" class="form-control"
                 value="{{ cliente.responsavel if cliente else '' }}">
        </div>
        <div class="col-12">
          <label class="form-label">Notas</label>
          <textarea name="notas" class="form-control" rows="3">{{ cliente.notas if cliente else '' }}</textarea>
        </div>
      </div>

      <div class="d-flex gap-2 mt-4 align-items-center">
        <button type="submit" class="btn btn-gold">
          <i class="bi bi-check-lg"></i> {{ 'Salvar alterações' if cliente else 'Criar cliente' }}
        </button>
        <a href="{{ next_url or ('/clientes/' + cliente.id|string if cliente else '/clientes') }}"
           class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>

    {% if cliente %}
    <!-- Deletar fora do form principal -->
    <hr class="mt-4">
    <form method="post" action="/clientes/{{ cliente.id }}/deletar"
          onsubmit="return confirm('Tem certeza que deseja deletar este cliente? Esta ação não pode ser desfeita.');">
      <button type="submit" class="btn btn-outline-danger btn-sm">
        <i class="bi bi-trash"></i> Deletar cliente
      </button>
    </form>
    {% endif %}
  </div>
</div>

{% endblock %}
